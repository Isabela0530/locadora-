<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Locadora de Filmes</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary px-4">
    <span class="navbar-brand">🎬 Locadora de Filmes</span>

    <div class="ms-auto">
        <button class="btn btn-light me-2">Home</button>
        <button class="btn btn-outline-light">Cadastro</button>
    </div>
</nav>

<div class="container mt-5">

    <div class="text-center mb-5">
        <h2 class="text-primary">Bem-vindo à Locadora</h2>
        <p>Gerencie os filmes cadastrados no sistema.</p>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-3">

        <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#modal">
            + Novo Filme
        </button>

        <select id="filtroGenero" class="form-select w-auto" onchange="filtrarGenero()">
            <option value="">Todos os gêneros</option>
            <option>Ação</option>
            <option>Comédia</option>
            <option>Drama</option>
            <option>Terror</option>
            <option>Romance</option>
            <option>Ficção</option>
        </select>

    </div>

    <div class="table-responsive">
        <table class="table table-striped table-hover align-middle shadow-sm">
            <thead class="table-primary text-center">
                <tr>
                    <th>Capa</th>
                    <th>Nome</th>
                    <th>Gênero</th>
                    <th>Ano</th>
                    <th>Classificação</th>
                    <th>Produtora</th>
                    <th>Ações</th>
                </tr>
            </thead>

            <tbody class="text-center" id="tabelaFilmes"></tbody>

        </table>
    </div>

</div>

<div class="modal fade" id="modal">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Novo Filme</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">

                <input type="text" id="capa" class="form-control mb-2" placeholder="URL da capa">

                <input type="text" id="nome" class="form-control mb-2" placeholder="Nome do filme">

                <select id="genero" class="form-select mb-2">
                    <option>Ação</option>
                    <option>Comédia</option>
                    <option>Drama</option>
                    <option>Terror</option>
                    <option>Romance</option>
                    <option>Ficção</option>
                </select>

                <input type="number" id="ano" class="form-control mb-2" placeholder="Ano">

                <input type="text" id="classificacao" class="form-control mb-2" placeholder="Classificação">

                <input type="text" id="produtora" class="form-control mb-2" placeholder="Produtora">

            </div>

            <div class="modal-footer">
                <button class="btn btn-primary" onclick="salvarFilme()">Salvar</button>
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
let filmes = [];

function salvarFilme(){

    const filme = {
        capa: document.getElementById("capa").value,
        nome: document.getElementById("nome").value,
        genero: document.getElementById("genero").value,
        ano: document.getElementById("ano").value,
        classificacao: document.getElementById("classificacao").value,
        produtora: document.getElementById("produtora").value
    };

    if(!filme.nome){
        alert("Nome obrigatório!");
        return;
    }

    filmes.push(filme);
    renderizarTabela();
    limparCampos();

    const modal = bootstrap.Modal.getInstance(document.getElementById('modal'));
    modal.hide();
}

function renderizarTabela(lista = filmes){

    const tabela = document.getElementById("tabelaFilmes");
    tabela.innerHTML = "";

    lista.forEach((filme, index) => {

        tabela.innerHTML += `
        <tr>
            <td><img src="${filme.capa}" width="60" class="rounded"></td>
            <td>${filme.nome}</td>
            <td>${filme.genero}</td>
            <td>${filme.ano}</td>
            <td>${filme.classificacao}</td>
            <td>${filme.produtora}</td>
            <td>
                <button class="btn btn-danger btn-sm" onclick="excluirFilme(${index})">
                    Excluir
                </button>
            </td>
        </tr>
        `;
    });
}

function excluirFilme(index){
    filmes.splice(index, 1);
    renderizarTabela();
}

function filtrarGenero(){

    const genero = document.getElementById("filtroGenero").value;

    if(genero === ""){
        renderizarTabela();
        return;
    }

    const filtrados = filmes.filter(filme => filme.genero === genero);

    renderizarTabela(filtrados);
}

function limparCampos(){
    document.getElementById("capa").value = "";
    document.getElementById("nome").value = "";
    document.getElementById("ano").value = "";
    document.getElementById("classificacao").value = "";
    document.getElementById("produtora").value = "";
}
</script>

</body>
</html>
